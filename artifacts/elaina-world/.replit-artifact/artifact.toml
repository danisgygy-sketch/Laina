kind = "web"
previewPath = "/"
title = "Elaina's Dream World"
version = "1.0.0"
id = "artifacts/elaina-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20824

[services.development]
run = "pnpm --filter @workspace/elaina-world run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elaina-world", "run", "build" ]
publicDir = "artifacts/elaina-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20824"
BASE_PATH = "/"
